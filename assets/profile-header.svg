<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Ali Erkan Ocakli - AI, data, and developer tools</title>
  <desc id="desc">A premium dark profile header with AI, data, and tools positioning.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="48%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="45%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <radialGradient id="glow" cx="65%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.24"/>
      <stop offset="52%" stop-color="#818cf8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#94a3b8" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="34" fill="url(#glow)"/>
  <rect width="1200" height="360" rx="34" fill="url(#grid)"/>

  <g opacity="0.95" filter="url(#softShadow)">
    <rect x="64" y="64" width="1072" height="232" rx="28" fill="#020617" fill-opacity="0.62" stroke="#334155" stroke-opacity="0.72"/>
    <rect x="64" y="64" width="1072" height="5" rx="2.5" fill="url(#accent)"/>
  </g>

  <g transform="translate(112 108)">
    <text x="0" y="0" fill="#94a3b8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="3">
      AI + DATA + TOOLS
    </text>
    <text x="0" y="62" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="56" font-weight="800">
      Ali Erkan Ocakli
    </text>
    <text x="0" y="106" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="23" font-weight="500">
      MCP servers, Python data workflows, and education products.
    </text>

    <g transform="translate(0 146)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" font-weight="700">
      <rect x="0" y="0" width="154" height="38" rx="19" fill="#0f172a" stroke="#38bdf8" stroke-opacity="0.55"/>
      <text x="24" y="25" fill="#e0f2fe">Scientific MCP</text>
      <rect x="170" y="0" width="138" height="38" rx="19" fill="#0f172a" stroke="#818cf8" stroke-opacity="0.55"/>
      <text x="194" y="25" fill="#e0e7ff">Data systems</text>
      <rect x="324" y="0" width="150" height="38" rx="19" fill="#0f172a" stroke="#34d399" stroke-opacity="0.55"/>
      <text x="348" y="25" fill="#dcfce7">Developer UX</text>
    </g>
  </g>
</svg>
