name: Metrics

on:
  # Refresh daily
  schedule:
    - cron: "0 3 * * *"
  # Allow manual runs
  workflow_dispatch:
  # Regenerate when the workflow itself changes
  push:
    branches: [main]
    paths:
      - .github/workflows/metrics.yml

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # Works out of the box with the built-in GITHUB_TOKEN (public data).
          # Add a classic PAT as the METRICS_TOKEN secret to also include
          # private-repo contributions and richer plugins.
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: Alierkn
          filename: assets/metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Istanbul

          # Language breakdown (replaces the old top-langs card)
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used

          # Isometric contribution calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # Commit the generated SVG back to the repo
          output_action: commit
          committer_branch: main
          committer_message: "chore(metrics): update GitHub metrics [skip ci]"
