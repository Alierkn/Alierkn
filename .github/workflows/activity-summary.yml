name: Activity summary

on:
  schedule:
    - cron: "20 3 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/scripts/render_activity_summary.py"
      - ".github/workflows/activity-summary.yml"

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Render activity summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/render_activity_summary.py

      - name: Commit updated summary
        run: |
          if git diff --quiet -- assets/activity-summary.svg; then
            echo "No activity summary changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/activity-summary.svg
          git commit -m "chore(activity): update profile summary [skip ci]"
          git push
